name: Build
on:
    push:
        branches: [ "**" ]
        tags-ignore: [ "**" ]
    pull_request:
    release:
        types: [ published ]
jobs:
    build:
        # Only run on PRs if the source branch is on someone else's repo
        if: ${{ github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name }}
        runs-on: "ubuntu-latest"
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: 21
            - uses: gradle/actions/setup-gradle@v6
            - name: Build
              run: ./gradlew build
            - name: Determine Status
              run: |
                  if [ "$(./gradlew properties | awk '/^version:/ { print $2; }' | grep '\-SNAPSHOT')" ]; then
                    echo "STATUS=snapshot" >> $GITHUB_ENV
                  else
                    echo "STATUS=release" >> $GITHUB_ENV
                  fi
            - name: Publish Snapshot
              if: "${{ env.STATUS != 'release' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}"
              run: ./gradlew publishAllPublicationsToSpectris-snapshotsRepository
              env:
                  ORG_GRADLE_PROJECT_spectrisUsername: "${{ secrets.REPO_USERNAME }}"
                  ORG_GRADLE_PROJECT_spectrisPassword: "${{ secrets.REPO_PASSWORD }}"
            - name: Publish Release
              if: "${{ env.STATUS == 'release' && github.event_name == 'release' }}"
              run: ./gradlew publishAllPublicationsToSpectris-releasesRepository
              env:
                  ORG_GRADLE_PROJECT_spectrisUsername: "${{ secrets.REPO_USERNAME }}"
                  ORG_GRADLE_PROJECT_spectrisPassword: "${{ secrets.REPO_PASSWORD }}"
